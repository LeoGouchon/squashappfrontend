<p-toast/>
<p-fluid class="menu-bar">
    <h3>SquashApp</h3>
    @if (this.tokenService.getAccessToken()) {
        <div class="mobile-menu-header">
            <button class="p-button p-button-text" (click)="toggleSidebar()">
                <i class="pi pi-bars"></i>
            </button>
        </div>
    }
</p-fluid>
@if (this.tokenService.getAccessToken()) {
    <p-drawer class="menu-drawer" position="right" header="Menu" [(visible)]="displaySidebar" [baseZIndex]="10">
        <p-panelMenu [model]="items"/>
        @if (this.tokenService.getAccessToken()) {
            <p-divider/>
            <div class="theme-menu-item">
                <div class="theme-menu-label">
                    <i class="pi" [class.pi-moon]="darkModeEnabled" [class.pi-sun]="!darkModeEnabled"></i>
                    <span>{{ themeLabel }}</span>
                </div>
                <div class="theme-menu-switch">
                    <p-toggleswitch
                        [(ngModel)]="darkModeEnabled"
                        (ngModelChange)="onThemeChange($event)"
                        inputId="theme-switch"/>
                </div>
            </div>
            <p-divider/>
            <p-panel-menu [model]="profilItems"/>
        }
        @if (this.tokenService.getIsAdmin()) {
            <p-divider/>
            <p-panel-menu [model]="adminItems"/>
        }
    </p-drawer>
}
